# Dogfood: run the codeup CLI against its own source on every PR and
# push to main, upload the SARIF to GitHub Code Scanning so findings
# show up as inline PR annotations and under Security → Code scanning.
#
# LLM provider: auto-resolved. If the `ANTHROPIC_API_KEY` repository
# secret is configured the scan uses Anthropic Claude; otherwise it
# falls back to GitHub Models (`models.github.ai`) via the built-in
# `GITHUB_TOKEN` — free for individual repos, no secret setup needed.
# Pass `--deterministic-only` via workflow_dispatch input to skip the
# LLM pass entirely when iterating on the deterministic checks.

name: codeup

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      deterministic_only:
        description: "Skip the LLM pass (faster, no API calls)"
        type: boolean
        default: false

# `security-events: write` is required by github/codeql-action/upload-sarif.
# `models: read` is required for `GITHUB_TOKEN` to call GitHub Models.
# `contents: read` is the default but we pin it explicitly so future
# default tightening doesn't break the workflow.
permissions:
  contents: read
  security-events: write
  models: read

jobs:
  scan:
    name: codeup self-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          # Scope by workflow so unrelated workflows don't share the key.
          shared-key: codeup-self-scan

      - name: Build codeup (release)
        run: cargo build --release --locked

      # Provider auto-resolution inside the CLI:
      # - If ANTHROPIC_API_KEY is exported (set via repo secret below),
      #   the scan uses Anthropic Claude.
      # - Otherwise it falls back to GitHub Models via GITHUB_TOKEN.
      # Both env vars are wired here; the CLI picks the first one with
      # a value.
      #
      # Model: Haiku for the dogfood loop. Sonnet hits the Tier-1
      # 30k-input-tokens-per-minute org cap on a workspace of this size
      # and forces the retry-on-429 loop to do most of the work — Haiku
      # has much higher per-tier caps, costs less, and the analyzer's
      # task (single-file tool-use) is well within its capability. Drop
      # this override once the org tier auto-bumps.
      # CODEUP_MODEL only applies when Anthropic is the active provider;
      # the GH Models fallback ignores it and uses its own default.
      #
      # `--fail-on none` keeps CI green even when findings exist; the
      # signal lives in the SARIF upload, not in the exit code. Flip
      # this to `high` once the catalogue stabilises and we want red
      # builds on regressions.
      - name: Run codeup scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only set when Anthropic is the active provider — GH Models
          # ignores Anthropic-shaped model names and would 400. The
          # bash logic below sets CODEUP_MODEL only if the secret is
          # present, so the GH Models fallback gets its own default.
        run: |
          set -euo pipefail
          DETERMINISTIC_FLAG=""
          if [ "${{ inputs.deterministic_only || 'false' }}" = "true" ]; then
            DETERMINISTIC_FLAG="--deterministic-only"
          fi
          MODEL_FLAG=""
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            MODEL_FLAG="--model claude-haiku-4-5"
          fi
          ./target/release/codeup scan . \
            $DETERMINISTIC_FLAG \
            $MODEL_FLAG \
            --out sarif \
            --output codeup.sarif \
            --fail-on none

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeup.sarif
          # `category` lets Code Scanning track results per-tool so
          # multiple analysers don't overwrite each other.
          category: codeup

      # Belt-and-braces: also attach the raw SARIF as a build artifact
      # so we can diff between runs even before Code Scanning ingests it.
      - name: Archive SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeup-sarif
          path: codeup.sarif
          retention-days: 14
