# Cross-platform release builds. Triggered by pushing a tag like v0.1.0.
#
# The matrix targets the four runner OS/arch combos that cover ~99% of
# GitHub Actions usage:
#   - linux x86_64    (ubuntu-latest)        — default GitHub runners
#   - linux aarch64   (ubuntu-24.04-arm)     — GitHub's ARM larger runners + self-hosted ARM
#   - macos arm64     (macos-latest = M-series) — current Mac runners
#   - macos x86_64    (macos-13)             — older Mac runners + dev machines
#
# Each job produces `codeup-<target>.tar.gz` containing the stripped
# binary and a license file. The final `release` job collects every
# artifact and attaches them all to the GitHub Release for the tag,
# plus a shell installer (`codeup-installer.sh`) that picks the right
# tarball for the runner's uname.
#
# Windows is intentionally omitted — the CLI's primary use case is
# Linux CI runners and developer macs. Add a windows target here when
# someone asks.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist in git)"
        required: true
        type: string

permissions:
  contents: write   # required to attach assets to the release

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            name: codeup-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            name: codeup-aarch64-unknown-linux-gnu
          - target: aarch64-apple-darwin
            runner: macos-latest
            name: codeup-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            runner: macos-13
            name: codeup-x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }} --bin codeup

      # The release profile already strips on most targets via Cargo.toml,
      # but run strip explicitly on macOS where the cargo `strip = true`
      # setting historically had quirks. Linux is harmless to re-strip.
      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/codeup || true

      - name: Package tarball
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/${{ matrix.target }}/release/codeup dist/codeup
          cp LICENSE dist/LICENSE
          cp README.md dist/README.md
          cd dist
          tar -czf ../${{ matrix.name }}.tar.gz codeup LICENSE README.md
          cd ..
          # SHA256 alongside the tarball for the installer to verify.
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Single source of truth: the installer lives at scripts/install.sh in
      # the repo (so it's reviewed, testable, and curl-able directly from
      # main). At release time we just copy it into the release assets under
      # the well-known name `codeup-installer.sh` so the README's one-liner
      # against `releases/latest/download/` keeps working.
      - name: Stage installer script
        run: |
          set -euo pipefail
          cp scripts/install.sh artifacts/codeup-installer.sh
          chmod +x artifacts/codeup-installer.sh

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/codeup-*.tar.gz
            artifacts/codeup-*.tar.gz.sha256
            artifacts/codeup-installer.sh
